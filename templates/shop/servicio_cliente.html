{% extends 'base.html' %}
{% block content %}
<div style="background: white; padding: 40px; border-radius: 4px; border: 1px solid #ddd; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: 1.5em; margin-bottom: 20px;">Hola. ¿En qué podemos ayudarte?</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
        <div style="border: 1px solid #eee; padding: 20px; border-radius: 8px; cursor: pointer;">
            <h3 style="font-size: 1em; color: #007185;">Tus Pedidos</h3>
            <p style="font-size: 0.85em; color: #555;">Rastrear, devolver o comprar productos de nuevo.</p>
        </div>
        <div style="border: 1px solid #eee; padding: 20px; border-radius: 8px; cursor: pointer;">
            <h3 style="font-size: 1em; color: #007185;">Dispositivos y contenido digital</h3>
            <p style="font-size: 0.85em; color: #555;">Ayuda con tus compras de música, libros o apps.</p>
        </div>
    </div>
</div>
{% endblock %}
